services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli -a redis123 ping
      interval: 5s
      timeout: 3s
      retries: 5

  proxy_pool:
    image: jhao104/proxy_pool:latest
    environment:
      DB_CONN: redis://:redis123@redis:6379/0
      PROXY_FETCHER: freeProxy01,freeProxy02,freeProxy03,freeProxy04,freeProxy05,freeProxy06,freeProxy07,freeProxy08,freeProxy09,freeProxy10
    ports:
      - "5010:5010"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
